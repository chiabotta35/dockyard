services:
  dockyard:
    build:
      context: .
      args:
        DOCKYARD_VERSION: v0.1.70
    container_name: dockyard
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/app/data
      - ./config.json:/config.json:ro
    environment:
      # --- Admin account (first run only, or to reset password) ---
      - DOCKYARD_ADMIN_USER=admin
      - DOCKYARD_ADMIN_PASSWORD=changeme

      # --- Update schedule ---
      - DOCKYARD_SCHEDULE=0 3 * * *
      - DOCKYARD_TIMEZONE=UTC

      # --- Update behavior ---
      - DOCKYARD_CLEANUP=true
      - DOCKYARD_MONITOR_ONLY=false
      - DOCKYARD_ROLLING_RESTART=false
      - DOCKYARD_LIFECYCLE_HOOKS=false
      - DOCKYARD_UPDATE_ON_START=false
      - DOCKYARD_COOLDOWN_DELAY=0s
      - DOCKYARD_STOP_TIMEOUT=30s

      # --- Backup ---
      - DOCKYARD_BACKUP_RETENTION=false
      - DOCKYARD_BACKUP_WINDOW_HOURS=24

      # --- Notifications (Shoutrrr URL) ---
      # Examples: ntfy://topic, discord://webhookid/token, slack://token
      - DOCKYARD_NOTIFICATION_URL=

      # --- Docker ---
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DOCKER_CONFIG=/
      - TZ=UTC
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
