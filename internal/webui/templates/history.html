<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dock: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .chevron { transition: transform 0.15s ease; }
        .chevron.open { transform: rotate(90deg); }
        .log-line { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center gap-3">
                    <div class="text-dock-500 text-xl">&#9875;</div>
                    <span class="text-lg font-bold tracking-tight">Dockyard</span>
                </div>
                <div class="flex items-center gap-1">
                    <a href="/" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800/50">Dashboard</a>
                    <a href="/settings" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800/50">Settings</a>
                    <a href="/history" class="px-3 py-1.5 rounded-md text-sm font-medium bg-gray-800 text-white">History</a>
                    <a href="/logs" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800/50">Logs</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <h1 class="text-2xl font-bold mb-6">Update History</h1>

        <div id="history-content"></div>

        <div id="empty-state" class="hidden text-center py-16 text-gray-500">
            <div class="text-4xl mb-3">&#128203;</div>
            <p>No update history yet</p>
            <p class="text-sm mt-1">Updates will appear here once you start managing containers</p>
        </div>
    </div>

    <script>
        function escapeHtml(s) {
            var d = document.createElement('div');
            d.appendChild(document.createTextNode(s));
            return d.innerHTML;
        }

        function formatDate(ts) {
            var d = new Date(ts);
            return d.toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
        }

        function formatTime(ts) {
            return new Date(ts).toLocaleTimeString();
        }

        function toggleHistoryLogs(id, sessionId) {
            var el = document.getElementById('logs-' + id);
            var chevron = document.getElementById('chevron-' + id);
            if (!el) return;
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                if (chevron) chevron.classList.add('open');
                if (!el.dataset.loaded) {
                    el.dataset.loaded = '1';
                    loadHistoryLogs(sessionId, id);
                }
            } else {
                el.classList.add('hidden');
                if (chevron) chevron.classList.remove('open');
            }
        }

        function loadHistoryLogs(sessionId, domId) {
            var el = document.getElementById('logs-' + domId);
            if (!el) return;
            el.innerHTML = '<div class="p-3 text-xs text-gray-500">Loading logs...</div>';

            var url = '/api/logs?session=' + encodeURIComponent(sessionId);
            fetch(url)
                .then(r => r.json())
                .then(logs => {
                    if (!logs || logs.length === 0) {
                        el.innerHTML = '<div class="p-3 text-xs text-gray-500">No logs recorded for this update</div>';
                        return;
                    }
                    var html = '<div class="bg-gray-950 border border-gray-800 rounded-lg p-3 max-h-80 overflow-y-auto">';
                    logs.forEach(l => {
                        var ts = formatTime(l.timestamp);
                        var cls = l.message.includes('Failed') || l.message.includes('error') ? 'text-red-400' :
                                  l.message.includes('complete') || l.message.includes('Success') || l.message.includes('Sent') ? 'text-emerald-400' : 'text-gray-400';
                        html += '<div class="log-line text-xs leading-5 flex gap-3">' +
                            '<span class="text-gray-600 w-20 shrink-0">' + ts + '</span>' +
                            '<span class="' + cls + '">' + escapeHtml(l.message) + '</span>' +
                            '</div>';
                    });
                    html += '</div>';
                    el.innerHTML = html;
                })
                .catch(() => {
                    el.innerHTML = '<div class="p-3 text-xs text-red-400">Failed to load logs</div>';
                });
        }

        fetch('/api/history')
            .then(r => r.json())
            .then(data => {
                if (!data || data.length === 0) {
                    document.getElementById('empty-state').classList.remove('hidden');
                    document.getElementById('history-content').classList.add('hidden');
                    return;
                }

                var grouped = {};
                data.forEach(h => {
                    var day = formatDate(h.timestamp);
                    if (!grouped[day]) grouped[day] = [];
                    grouped[day].push(h);
                });

                var html = '';
                Object.keys(grouped).forEach(day => {
                    html += '<div class="mb-6">' +
                        '<h2 class="text-sm font-semibold text-gray-400 mb-2">' + escapeHtml(day) + '</h2>' +
                        '<div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">';

                    grouped[day].forEach((h, i) => {
                        var id = (h.session_id || h.timestamp) + '-' + i;
                        var statusBadge = h.status === 'success' ?
                            '<span class="inline-flex items-center gap-1 text-xs font-medium text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded-full">&#10003; Updated</span>' :
                            (h.status === 'failed' ?
                                '<span class="inline-flex items-center gap-1 text-xs font-medium text-red-400 bg-red-500/10 px-2 py-0.5 rounded-full">&#10007; Failed</span>' :
                                (h.status === 'rollback' ?
                                    '<span class="inline-flex items-center gap-1 text-xs font-medium text-amber-400 bg-amber-500/10 px-2 py-0.5 rounded-full">&#8630; Rollback</span>' :
                                    '<span class="inline-flex items-center gap-1 text-xs font-medium text-gray-400 bg-gray-500/10 px-2 py-0.5 rounded-full">' + escapeHtml(h.status) + '</span>'));

                        function fmtDuration(ns) {
                            if (!ns) return '';
                            var ms = Math.round(ns / 1000000);
                            if (ms < 1000) return ms + 'ms';
                            return (ms / 1000).toFixed(1) + 's';
                        }
                        var duration = h.duration ? '<span class="text-xs text-gray-600">' + fmtDuration(h.duration) + '</span>' : '';

                        html += '<div class="border-b border-gray-800 last:border-b-0">' +
                            '<div class="px-4 py-3 hover:bg-gray-800/30 cursor-pointer transition-colors" onclick="toggleHistoryLogs(\'' + id + '\', \'' + escapeHtml(h.session_id || '') + '\')">' +
                            '<div class="flex items-center justify-between">' +
                            '<div class="flex items-center gap-3">' +
                            '<span id="chevron-' + id + '" class="chevron text-gray-600 text-xs inline-block">&#9654;</span>' +
                            '<div class="flex items-center gap-2">' +
                            '<span class="text-sm font-medium text-white">' + escapeHtml(h.container) + '</span>' +
                            statusBadge +
                            '</div>' +
                            '</div>' +
                            '<div class="flex items-center gap-3">' +
                            duration +
                            '<span class="text-xs text-gray-500">' + formatTime(h.timestamp) + '</span>' +
                            '</div>' +
                            '</div>' +
                            (h.image_name ? '<div class="ml-7 text-xs text-gray-600 font-mono truncate">' + escapeHtml(h.image_name) + '</div>' : '') +
                            '</div>' +
                            '<div id="logs-' + id + '" class="hidden px-4 pb-3"></div>' +
                            '</div>';
                    });

                    html += '</div></div>';
                });

                document.getElementById('history-content').innerHTML = html;
            });
    </script>
</body>
</html>
