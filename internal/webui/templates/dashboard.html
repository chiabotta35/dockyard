<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dock: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e', 950: '#082f49' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .log-line { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
        .chevron { transition: transform 0.15s ease; display: inline-block; }
        .chevron.open { transform: rotate(90deg); }
        @keyframes toast-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toast-out { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }
        .toast-in { animation: toast-in 0.3s ease-out forwards; }
        .toast-out { animation: toast-out 0.4s ease-in forwards; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center gap-3">
                    <div class="text-dock-500 text-xl">&#9875;</div>
                    <span class="text-lg font-bold tracking-tight">Dockyard</span>
                    <span class="text-xs text-gray-500 bg-gray-800 px-2 py-0.5 rounded-full">{{.Version}}</span>
                </div>
                <div class="flex items-center gap-1">
                    <a href="/" class="px-3 py-1.5 rounded-md text-sm font-medium bg-gray-800 text-white">Dashboard</a>
                    <a href="/settings" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800/50">Settings</a>
                    <a href="/history" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800/50">History</a>
                    <a href="/logs" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800/50">Logs</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">Container Dashboard</h1>
                <p class="text-sm text-gray-500 mt-0.5">Monitor and manage Docker container updates{{if .Version}} &middot; <span class="text-gray-600">{{.Version}}</span>{{end}}</p>
            </div>
            <div class="flex items-center gap-3">
                <div id="update-progress" class="hidden flex items-center gap-3">
                    <div class="w-48 h-2 bg-gray-800 rounded-full overflow-hidden">
                        <div id="update-progress-bar" class="h-full bg-dock-500 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                    <span id="update-eta" class="text-sm text-gray-400 whitespace-nowrap"></span>
                </div>
                <button id="self-update-btn" onclick="selfUpdate()" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors items-center gap-2">
                    <span>&#8635;</span>
                    <span id="self-update-text">Update Dockyard</span>
                </button>
                <button onclick="checkAll()" id="check-btn" class="bg-dock-600 hover:bg-dock-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
                    <span id="check-spinner" class="hidden animate-spin">&#8635;</span>
                    <span>Check Now</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-6 gap-4 mb-4">
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
                <div class="text-sm text-gray-500">Total</div>
                <div class="text-2xl font-bold mt-1" id="stat-total">-</div>
            </div>
            <div class="bg-gray-900 border border-amber-500/30 rounded-xl p-4 transition-all" id="stat-updates-card">
                <div class="text-sm text-amber-400/70">Updates</div>
                <div class="text-2xl font-bold mt-1 text-amber-400" id="stat-updates">-</div>
            </div>
            <div class="bg-gray-900 border border-emerald-500/30 rounded-xl p-4 transition-all" id="stat-ok-card">
                <div class="text-sm text-emerald-400/70">Up to date</div>
                <div class="text-2xl font-bold mt-1 text-emerald-400" id="stat-ok">-</div>
            </div>
            <div class="bg-gray-900 border border-emerald-500/30 rounded-xl p-4">
                <div class="text-sm text-emerald-400/70">Auto</div>
                <div class="text-2xl font-bold mt-1 text-emerald-400" id="stat-auto">-</div>
            </div>
            <div class="bg-gray-900 border border-purple-500/30 rounded-xl p-4">
                <div class="text-sm text-purple-400/70">Deferred</div>
                <div class="text-2xl font-bold mt-1 text-purple-400" id="stat-deferred">-</div>
            </div>
            <div class="bg-gray-900 border border-red-500/30 rounded-xl p-4 transition-all" id="stat-failed-card">
                <div class="text-sm text-red-400/70">Failed</div>
                <div class="text-2xl font-bold mt-1 text-red-400" id="stat-failed">-</div>
            </div>
        </div>

        <div id="auto-check-bar" class="flex items-center justify-between mb-4 px-4 py-2 bg-gray-900/50 border border-gray-800 rounded-lg text-xs text-gray-500">
            <div class="flex items-center gap-4">
                <span id="auto-last">Last check: never</span>
                <span id="auto-next" class="hidden">Next check: calculating...</span>
            </div>
            <span id="auto-interval" class="text-gray-600"></span>
        </div>

        <div class="flex items-center gap-1 mb-4 border-b border-gray-800 pb-px" id="filter-tabs">
            <button class="filter-tab px-3 py-1.5 text-sm rounded-t-md border-b-2 transition-colors text-white border-dock-500" data-filter="all" onclick="setFilter('all', this)">All</button>
            <button class="filter-tab px-3 py-1.5 text-sm rounded-t-md border-b-2 transition-colors text-gray-500 border-transparent hover:text-gray-300" data-filter="updates" onclick="setFilter('updates', this)">Updates</button>
            <button class="filter-tab px-3 py-1.5 text-sm rounded-t-md border-b-2 transition-colors text-gray-500 border-transparent hover:text-gray-300" data-filter="auto" onclick="setFilter('auto', this)">Auto</button>
            <button class="filter-tab px-3 py-1.5 text-sm rounded-t-md border-b-2 transition-colors text-gray-500 border-transparent hover:text-gray-300" data-filter="deferred" onclick="setFilter('deferred', this)">Deferred</button>
        </div>

        <div id="scan-banner" class="hidden mb-4 px-4 py-3 rounded-xl text-sm font-medium border"></div>

        <div id="container-grid" class="space-y-2">
            <div class="text-center py-12 text-gray-500">
                <div class="animate-spin text-2xl mb-2">&#8635;</div>
                Loading containers...
            </div>
        </div>

        <div id="sidecar-section" class="hidden mt-4">
            <button onclick="toggleSidecars()" id="sidecar-toggle" class="w-full text-left px-4 py-2.5 bg-gray-900 border border-gray-800 rounded-xl text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-900/80 transition-colors flex items-center gap-2">
            </button>
            <div id="sidecar-grid" class="space-y-2 mt-2 hidden"></div>
        </div>

        <div id="db-section" class="hidden mt-4">
            <button onclick="toggleDatabases()" id="db-toggle" class="w-full text-left px-4 py-2.5 bg-gray-900 border border-gray-800 rounded-xl text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-900/80 transition-colors flex items-center gap-2">
            </button>
            <div id="database-grid" class="space-y-2 mt-2 hidden"></div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-md"></div>

    <script>
    (function() {
        var currentFilter = 'all';
        var containers = [];
        var checked = {};  // Track per-container check state: 'stale'|'ok'|'error'|null
        var expanded = {};
        var containerLogs = {};
        var updateTotal = 0;
        var updateDone = 0;
        var updateStart = null;
        var showDatabases = false;
        var showSidecars = false;

        var DB_IMAGES = /^(mysql|mariadb|postgres(?:ql)?|mongo(?:db)?|redis|memcached|influxdb|timescaledb|cockroach(?:db)?|cassandra|elasticsearch|opensearch|clickhouse|neo4j|couchdb|valkey|keydb|scylladb|mssql|percona|tidb|planetscale|dragonflydb|ferretdb)/i;
        var SIDECAR_IMAGES = /tika|gotenberg|pdfjs|libreoffice|chromium|wkhtmltopdf|collabora|onlyoffice|embedder|exiftool|ghostscript|imgproxy|pdfcpu|qpdf|poppler|pandoc/i;

        function isDatabase(c) {
            if (!c.image) return false;
            var repo = c.image.split(':')[0].split('/').pop();
            return DB_IMAGES.test(repo);
        }

        function isSidecar(c) {
            if (!c.image) return false;
            var repo = c.image.split(':')[0].split('/').pop();
            return SIDECAR_IMAGES.test(repo);
        }

        function showToast(message, type) {
            type = type || 'error';
            var ct = document.getElementById('toast-container');
            var colors = type === 'error'
                ? 'bg-red-500/10 border-red-500/40 text-red-400'
                : type === 'warning'
                    ? 'bg-amber-500/10 border-amber-500/40 text-amber-400'
                    : 'bg-emerald-500/10 border-emerald-500/40 text-emerald-400';
            var toast = document.createElement('div');
            toast.className = 'toast-in px-4 py-3 rounded-xl text-sm border backdrop-blur-sm ' + colors;
            toast.textContent = message;
            ct.appendChild(toast);
            setTimeout(function() {
                toast.classList.remove('toast-in');
                toast.classList.add('toast-out');
                setTimeout(function() { toast.remove(); }, 500);
            }, 6000);
        }

        function esc(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.appendChild(document.createTextNode(s));
            return d.innerHTML;
        }

        function truncate(s, n) {
            return s && s.length > n ? s.substring(0, n) + '...' : (s || '');
        }

        // Compute visual state for a container
        function getVisualState(c) {
            var cs = checked[c.name];
            if (c.check_error || cs === 'error') return 'error';
            if (c.stale || cs === 'stale') return 'stale';
            if (cs === 'ok') return 'ok';
            return 'unchecked';
        }

        function getFiltered() {
            if (currentFilter === 'updates') return containers.filter(function(c) { return getVisualState(c) === 'stale'; });
            if (currentFilter === 'auto') return containers.filter(function(c) { return c.update_mode === 'auto'; });
            if (currentFilter === 'deferred') return containers.filter(function(c) { return c.is_deferred; });
            return containers;
        }

        function buildCard(c) {
            var n = esc(c.name);
            var isExpanded = expanded[c.name];
            var vs = getVisualState(c);

            // Extract version tag from image reference (e.g. "nginx:1.25" → "1.25")
            var versionTag = '';
            if (c.image) {
                var parts = c.image.split(':');
                if (parts.length > 1) {
                    versionTag = parts[parts.length - 1].split('/').pop();
                }
            }
            var versionBadge = versionTag ? '<span class="text-xs text-gray-500 bg-gray-800 px-2 py-0.5 rounded-full font-mono">' + esc(versionTag) + '</span>' : '';

            var statusDot, borderColor;
            switch (vs) {
                case 'stale':    statusDot = 'bg-amber-400 status-pulse'; borderColor = ' border-l-2 border-l-amber-400'; break;
                case 'error':    statusDot = 'bg-red-400'; borderColor = ' border-l-2 border-l-red-400'; break;
                case 'ok':       statusDot = 'bg-emerald-400'; borderColor = ' border-l-2 border-l-emerald-400'; break;
                default:         statusDot = (c.state === 'running' ? 'bg-gray-500' : 'bg-red-400'); borderColor = ''; break;
            }

            var stateBadge = c.state === 'running' ? '<span class="text-xs text-emerald-400">&#9679; running</span>' : '<span class="text-xs text-red-400">&#9679; stopped</span>';

            var statusBadge = '';
            if (vs === 'stale') statusBadge = '<span class="text-xs bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded-full font-medium">Update available</span>';
            else if (vs === 'ok') statusBadge = '<span class="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full">Up to date</span>';
            else if (vs === 'error') statusBadge = '<span class="text-xs bg-red-500/20 text-red-400 px-2 py-0.5 rounded-full" title="' + esc(c.check_error) + '">Check failed</span>';

            var modeIcon = c.update_mode === 'auto' ? '&#9889;' : (c.update_mode === 'ignore' ? '&#128683;' : '&#9998;');
            var modeColor = c.update_mode === 'auto' ? 'text-emerald-400' : (c.update_mode === 'ignore' ? 'text-red-400' : 'text-amber-400');
            var modeLabel = c.update_mode === 'auto' ? 'Auto' : (c.update_mode === 'ignore' ? 'Ignore' : 'Manual');
            var deferBadge = c.is_deferred ? '<span class="text-xs bg-purple-500/20 text-purple-400 px-2 py-0.5 rounded-full ml-2">Deferred</span>' : '';
            var stackBadge = c.compose_stack ? '<span class="text-xs bg-dock-500/20 text-dock-500 px-2 py-0.5 rounded-full">' + esc(c.compose_stack) + '</span>' : '';

            var actionBtns = '';
            if (c.update_mode !== 'ignore') {
                actionBtns += '<button onclick="event.stopPropagation(); checkSingle(\'' + n + '\')" id="check-btn-' + n + '" class="bg-gray-700 hover:bg-gray-600 text-white px-2.5 py-1.5 rounded-lg text-xs font-medium transition-colors" title="Check for updates">Check</button>';
            }
            if (vs === 'stale') {
                if (c.is_self) {
                    actionBtns += '<button onclick="event.stopPropagation(); triggerUpdate(\'' + n + '\')" class="bg-dock-600 hover:bg-dock-700 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" title="Updates Dockyard itself">Update Dockyard</button>';
                } else if (c.update_mode !== 'ignore') {
                    actionBtns += '<button onclick="event.stopPropagation(); triggerUpdate(\'' + n + '\')" class="bg-dock-600 hover:bg-dock-700 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors">Update</button>';
                }
            }
            if (c.has_previous_image) {
                actionBtns += '<button onclick="event.stopPropagation(); rollbackContainer(\'' + n + '\')" class="bg-amber-600 hover:bg-amber-700 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" title="Rollback">Rollback</button>';
            }

            var logCount = (containerLogs[c.name] || []).length;
            var logBadge = logCount > 0 ? '<span class="text-xs text-gray-600 ml-2">' + logCount + '</span>' : '';

            var html = '<div id="card-' + n + '" class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden' + borderColor + '">'
                + '<div class="p-4 cursor-pointer hover:bg-gray-900/50 transition-colors" onclick="toggleDetail(\'' + n + '\')">'
                + '<div class="flex items-start justify-between">'
                + '<div class="flex-1 min-w-0">'
                + '<div class="flex items-center gap-2 mb-1">'
                + '<span id="chevron-' + n + '" class="chevron text-gray-600 text-xs' + (isExpanded ? ' open' : '') + '">&#9654;</span>'
                + '<div class="w-2.5 h-2.5 rounded-full ' + statusDot + '"></div>'
                + '<h3 class="font-semibold text-white truncate">' + n + '</h3>'
                + (c.is_self ? '<span class="text-xs bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full">Self</span>' : '')
                + versionBadge + statusBadge + stackBadge + deferBadge + logBadge
                + '</div>'
                + '<p class="text-xs text-gray-500 font-mono truncate ml-7 mb-1">' + esc(c.image) + '</p>'
                + '<div class="flex items-center gap-3 text-xs text-gray-500 ml-7">'
                + stateBadge
                + '<span>' + esc(c.ports) + '</span>'
                + '</div>'
                + '</div>'
                + '<div class="flex items-center gap-2 ml-4">'
                + '<span class="' + modeColor + ' text-sm" title="' + modeLabel + '">' + modeIcon + '</span>'
                + actionBtns
                + '</div>'
                + '</div>'
                + '</div>'
                + '<div id="detail-' + n + '" class="border-t border-gray-800' + (isExpanded ? '' : ' hidden') + '">'
                + '<div class="p-4 space-y-4">'
                + '<div class="grid grid-cols-2 md:grid-cols-4 gap-3">'
                + '<div><div class="text-xs text-gray-500">Image</div><div class="text-sm font-mono text-gray-300 truncate" title="' + esc(c.image) + '">' + esc(c.image) + '</div></div>'
                + '<div><div class="text-xs text-gray-500">Image ID</div><div class="text-sm font-mono text-gray-300">' + esc(truncate(c.image_id, 19)) + '</div></div>'
                + '<div><div class="text-xs text-gray-500">State</div><div class="text-sm text-gray-300">' + (c.state === 'running' ? 'Running' : 'Stopped') + '</div></div>'
                + '<div><div class="text-xs text-gray-500">Mode</div><div class="text-sm text-gray-300">' + modeLabel + '</div></div>'
                + (c.compose_stack ? '<div><div class="text-xs text-gray-500">Stack</div><div class="text-sm text-gray-300">' + esc(c.compose_stack) + '</div></div>' : '')
                + (c.ports ? '<div><div class="text-xs text-gray-500">Ports</div><div class="text-sm font-mono text-gray-300">' + esc(c.ports) + '</div></div>' : '')
                + (c.is_deferred ? '<div><div class="text-xs text-gray-500">Deferred Until</div><div class="text-sm text-purple-400">' + esc(c.defer_until) + '</div></div>' : '')
                + (c.check_error ? '<div class="col-span-2 bg-red-500/10 border border-red-500/30 rounded-lg p-2"><div class="text-xs text-red-400">Staleness check failed</div><div class="text-xs text-gray-400 mt-1 font-mono">' + esc(c.check_error) + '</div></div>' : '')
                + (vs === 'ok' ? '<div class="col-span-2 bg-emerald-500/10 border border-emerald-500/30 rounded-lg p-2"><div class="text-xs text-emerald-400">Image is up to date</div></div>' : '')
                + (c.latest_image && c.stale ? '<div class="col-span-2 bg-amber-500/10 border border-amber-500/30 rounded-lg p-2"><div class="text-xs text-amber-400">Update available</div><div class="text-xs text-gray-400 mt-1 font-mono">' + esc(c.latest_image) + '</div></div>' : '')
                + (c.checked_at ? '<div><div class="text-xs text-gray-500">Last Checked</div><div class="text-sm text-gray-300">' + new Date(c.checked_at).toLocaleString() + '</div></div>' : '')
                + (c.has_previous_image ? '<div class="col-span-2"><div class="text-xs text-gray-500">Previous Image</div><div class="text-sm font-mono text-amber-400">' + esc(c.previous_image) + '</div></div>' : '')
                + (c.is_self ? '<div class="col-span-2 bg-blue-500/10 border border-blue-500/30 rounded-lg p-2"><div class="text-xs text-blue-400">This is Dockyard. Updating starts a replacement first, then stops this one.</div></div>' : '')
                + '</div>'
                + '<div class="flex items-center gap-3">'
                + '<select onchange="setMode(\'' + n + '\', this.value)" class="bg-gray-800 border border-gray-700 text-gray-300 text-xs rounded-lg px-2 py-1">'
                + '<option value="manual"' + (c.update_mode === 'manual' ? ' selected' : '') + '>Manual</option>'
                + '<option value="auto"' + (c.update_mode === 'auto' ? ' selected' : '') + '>Auto</option>'
                + '<option value="ignore"' + (c.update_mode === 'ignore' ? ' selected' : '') + '>Ignore</option>'
                + '</select>'
                + (c.update_mode !== 'ignore' ? (
                    c.is_deferred
                        ? '<button onclick="cancelDefer(\'' + n + '\')" class="text-xs bg-purple-500/20 hover:bg-purple-500/30 text-purple-400 px-2 py-1 rounded">Cancel Defer</button>'
                        : '<div class="flex gap-1">'
                            + '<button onclick="deferContainer(\'' + n + '\', 7)" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-2 py-1 rounded">7d</button>'
                            + '<button onclick="deferContainer(\'' + n + '\', 14)" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-2 py-1 rounded">14d</button>'
                            + '<button onclick="deferContainer(\'' + n + '\', 30)" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-2 py-1 rounded">30d</button>'
                            + '</div>'
                ) : '')
                + '</div>'
                + '<div class="bg-gray-950 border border-gray-800 rounded-lg overflow-hidden">'
                + '<div class="flex items-center justify-between px-3 py-2 border-b border-gray-800">'
                + '<span class="text-xs font-medium text-gray-400">Logs</span>'
                + '<button onclick="clearLogs(\'' + n + '\')" class="text-xs text-gray-600 hover:text-gray-400">Clear</button>'
                + '</div>'
                + '<div id="log-content-' + n + '" class="max-h-64 overflow-y-auto p-3 space-y-0.5 text-xs log-line">'
                + renderLogLines(c.name)
                + '</div>'
                + '</div>'
                + '</div>'
                + '</div>'
                + '</div>';
            return html;
        }

        function renderLogLines(name) {
            var logs = containerLogs[name] || [];
            if (logs.length === 0) return '<div class="text-gray-600">No logs yet</div>';
            return logs.map(function(l) {
                return '<div class="text-gray-500">' + esc(l.time) + ' <span class="text-dock-400">' + esc(l.msg) + '</span></div>';
            }).join('');
        }

        function renderList() {
            var filtered = getFiltered();
            var regular = filtered.filter(function(c) { return !isDatabase(c) && !isSidecar(c); });
            var databases = filtered.filter(function(c) { return isDatabase(c); });
            var sidecars = filtered.filter(function(c) { return isSidecar(c); });
            var grid = document.getElementById('container-grid');
            var dbGrid = document.getElementById('database-grid');
            var dbToggle = document.getElementById('db-toggle');
            var dbSection = document.getElementById('db-section');
            var scGrid = document.getElementById('sidecar-grid');
            var scToggle = document.getElementById('sidecar-toggle');
            var scSection = document.getElementById('sidecar-section');

            if (regular.length === 0 && databases.length === 0 && sidecars.length === 0) {
                grid.innerHTML = '<div class="text-center py-12 text-gray-500">No containers match this filter</div>';
                if (dbSection) dbSection.classList.add('hidden');
                if (scSection) scSection.classList.add('hidden');
            } else {
                grid.innerHTML = regular.length > 0 ? regular.map(buildCard).join('') : '<div class="text-center py-4 text-gray-600 text-sm">No containers</div>';

                if (sidecars.length > 0) {
                    scSection.classList.remove('hidden');
                    scToggle.textContent = 'Sidecars (' + sidecars.length + ') ' + (showSidecars ? '\u25B2' : '\u25BC');
                    if (showSidecars) {
                        scGrid.innerHTML = sidecars.map(buildCard).join('');
                        scGrid.classList.remove('hidden');
                    } else {
                        scGrid.innerHTML = '';
                        scGrid.classList.add('hidden');
                    }
                } else {
                    scSection.classList.add('hidden');
                }

                if (databases.length > 0) {
                    dbSection.classList.remove('hidden');
                    dbToggle.textContent = 'Databases (' + databases.length + ') ' + (showDatabases ? '\u25B2' : '\u25BC');
                    if (showDatabases) {
                        dbGrid.innerHTML = databases.map(buildCard).join('');
                        dbGrid.classList.remove('hidden');
                    } else {
                        dbGrid.innerHTML = '';
                        dbGrid.classList.add('hidden');
                    }
                } else {
                    dbSection.classList.add('hidden');
                }
            }
            updateStats();
        }

        // --- Surgical DOM updates ---

        function updateCardVisualState(name) {
            var card = document.getElementById('card-' + name);
            if (!card) return;
            var c = containers.find(function(x) { return x.name === name; });
            if (!c) return;
            var vs = getVisualState(c);

            // Status dot
            var dot = card.querySelector('.w-2\\.5');
            if (dot) {
                var dotClass;
                switch (vs) {
                    case 'stale': dotClass = 'bg-amber-400 status-pulse'; break;
                    case 'error': dotClass = 'bg-red-400'; break;
                    case 'ok': dotClass = 'bg-emerald-400'; break;
                    default: dotClass = (c.state === 'running' ? 'bg-gray-500' : 'bg-red-400'); break;
                }
                dot.className = 'w-2.5 h-2.5 rounded-full ' + dotClass;
            }

            // Left border
            var borderClass;
            switch (vs) {
                case 'stale': borderClass = ' border-l-2 border-l-amber-400'; break;
                case 'error': borderClass = ' border-l-2 border-l-red-400'; break;
                case 'ok': borderClass = ' border-l-2 border-l-emerald-400'; break;
                default: borderClass = ''; break;
            }
            card.className = 'bg-gray-900 border border-gray-800 rounded-xl overflow-hidden' + borderClass;

            // Badge area
            var badgeContainer = card.querySelector('.flex.items-center.gap-2.mb-1');
            if (badgeContainer) {
                var oldAmber = badgeContainer.querySelector('.bg-amber-500\\/20');
                var oldGreen = badgeContainer.querySelector('.bg-emerald-500\\/20');
                var oldRed = badgeContainer.querySelectorAll('.bg-red-500\\/20');
                if (oldAmber) oldAmber.remove();
                if (oldGreen) oldGreen.remove();
                if (oldRed) oldRed.forEach(function(el) { if (el.textContent.indexOf('Check failed') !== -1) el.remove(); });

                var h3 = badgeContainer.querySelector('h3');
                if (h3) {
                    if (vs === 'stale') {
                        var b = document.createElement('span');
                        b.className = 'text-xs bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded-full font-medium';
                        b.textContent = 'Update available';
                        h3.parentNode.insertBefore(b, h3.nextSibling);
                    } else if (vs === 'ok') {
                        var b = document.createElement('span');
                        b.className = 'text-xs bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full';
                        b.textContent = 'Up to date';
                        h3.parentNode.insertBefore(b, h3.nextSibling);
                    } else if (vs === 'error') {
                        var b = document.createElement('span');
                        b.className = 'text-xs bg-red-500/20 text-red-400 px-2 py-0.5 rounded-full';
                        b.textContent = 'Check failed';
                        b.title = c.check_error || '';
                        h3.parentNode.insertBefore(b, h3.nextSibling);
                    }
                }
            }

            // Buttons
            updateCardButtons(name, vs === 'stale', c.is_self, c.update_mode);
        }

        function updateCardButtons(name, stale, isSelf, mode) {
            var card = document.getElementById('card-' + name);
            if (!card) return;
            var btnsContainer = card.querySelector('.flex.items-center.gap-2.ml-4');
            if (!btnsContainer) return;
            var existingBtns = btnsContainer.querySelectorAll('button');
            var rollbackBtn = null;
            existingBtns.forEach(function(b) { if (b.textContent === 'Rollback') rollbackBtn = b; });
            var newBtns = '';
            if (mode !== 'ignore') {
                newBtns += '<button onclick="event.stopPropagation(); checkSingle(\'' + name + '\')" id="check-btn-' + name + '" class="bg-gray-700 hover:bg-gray-600 text-white px-2.5 py-1.5 rounded-lg text-xs font-medium transition-colors" title="Check for updates">Check</button>';
            }
            if (stale) {
                if (isSelf) {
                    newBtns += '<button onclick="event.stopPropagation(); triggerUpdate(\'' + name + '\')" class="bg-dock-600 hover:bg-dock-700 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" title="Updates Dockyard itself">Update Dockyard</button>';
                } else if (mode !== 'ignore') {
                    newBtns += '<button onclick="event.stopPropagation(); triggerUpdate(\'' + name + '\')" class="bg-dock-600 hover:bg-dock-700 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors">Update</button>';
                }
            }
            if (rollbackBtn) newBtns += rollbackBtn.outerHTML;
            var modeSpan = btnsContainer.querySelector('span');
            btnsContainer.innerHTML = (modeSpan ? modeSpan.outerHTML : '') + newBtns;
        }

        function updateStats() {
            document.getElementById('stat-total').textContent = containers.length;
            var updateCount = containers.filter(function(c) { return getVisualState(c) === 'stale'; }).length;
            var failedCount = containers.filter(function(c) { return getVisualState(c) === 'error'; }).length;
            var okCount = containers.filter(function(c) { return getVisualState(c) === 'ok'; }).length;
            document.getElementById('stat-updates').textContent = updateCount;
            document.getElementById('stat-auto').textContent = containers.filter(function(c) { return c.update_mode === 'auto'; }).length;
            document.getElementById('stat-deferred').textContent = containers.filter(function(c) { return c.is_deferred; }).length;
            document.getElementById('stat-failed').textContent = failedCount;
            document.getElementById('stat-ok').textContent = okCount;

            var updatesCard = document.getElementById('stat-updates-card');
            var failedCard = document.getElementById('stat-failed-card');
            var okCard = document.getElementById('stat-ok-card');
            if (updateCount > 0) {
                updatesCard.className = 'bg-amber-500/5 border border-amber-500/50 rounded-xl p-4 transition-all shadow-lg shadow-amber-500/10';
            } else {
                updatesCard.className = 'bg-gray-900 border border-amber-500/30 rounded-xl p-4 transition-all';
            }
            if (failedCount > 0) {
                failedCard.className = 'bg-red-500/5 border border-red-500/50 rounded-xl p-4 transition-all shadow-lg shadow-red-500/10';
            } else {
                failedCard.className = 'bg-gray-900 border border-red-500/30 rounded-xl p-4 transition-all';
            }
            if (okCount > 0) {
                okCard.className = 'bg-emerald-500/5 border border-emerald-500/50 rounded-xl p-4 transition-all shadow-lg shadow-emerald-500/10';
            } else {
                okCard.className = 'bg-gray-900 border border-emerald-500/30 rounded-xl p-4 transition-all';
            }
        }

        // --- Public functions ---

        window.setFilter = function(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(function(t) {
                t.className = t.className.replace(/text-white border-dock-500/g, 'text-gray-500 border-transparent');
            });
            btn.className = btn.className.replace(/text-gray-500 border-transparent/g, 'text-white border-dock-500');
            renderList();
        };

        window.toggleDatabases = function() {
            showDatabases = !showDatabases;
            renderList();
        };

        window.toggleSidecars = function() {
            showSidecars = !showSidecars;
            renderList();
        };

        window.toggleDetail = function(name) {
            var el = document.getElementById('detail-' + name);
            var chevron = document.getElementById('chevron-' + name);
            if (!el) return;
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                if (chevron) chevron.classList.add('open');
                expanded[name] = true;
            } else {
                el.classList.add('hidden');
                if (chevron) chevron.classList.remove('open');
                delete expanded[name];
            }
        };

        window.setMode = function(name, mode) {
            fetch('/api/containers/' + name + '/mode', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mode: mode})
            }).then(function() { refreshContainers(); });
        };

        window.triggerUpdate = function(name) {
            if (updateTotal === 0) {
                updateTotal = 1;
                updateDone = 0;
                updateStart = Date.now();
                showUpdateProgress();
            }
            containerLogs[name] = [];
            fetch('/api/containers/' + name + '/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            }).then(function() {
                if (!containerLogs[name]) containerLogs[name] = [];
                expanded[name] = true;
            });
        };

        window.checkSingle = function(name) {
            var btn = document.getElementById('check-btn-' + name);
            if (btn) { btn.disabled = true; btn.textContent = '...'; }
            containerLogs[name] = [];
            if (expanded[name]) renderLogPanel(name);
            fetch('/api/containers/' + encodeURIComponent(name) + '/check', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            }).then(function(r) { return r.json(); }).then(function(data) {
                var c = containers.find(function(x) { return x.name === name; });
                if (c) {
                    c.stale = data.stale;
                    c.check_error = data.check_error || '';
                    checked[name] = data.check_error ? 'error' : (data.stale ? 'stale' : 'ok');
                    updateCardVisualState(name);
                    updateStats();
                }
                if (data.check_error) {
                    showToast(name + ': ' + data.check_error, 'error');
                } else if (data.stale) {
                    showToast(name + ': update available', 'warning');
                } else {
                    showToast(name + ': up to date', 'success');
                }
                if (btn) { btn.disabled = false; btn.textContent = 'Check'; }
            }).catch(function() {
                if (btn) { btn.disabled = false; btn.textContent = 'Check'; }
            });
        };

        window.rollbackContainer = function(name) {
            if (!confirm('Rollback ' + name + '?')) return;
            fetch('/api/containers/' + name + '/rollback', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (!containerLogs[name]) containerLogs[name] = [];
                containerLogs[name].push({time: new Date().toLocaleTimeString(), msg: 'Rolling back to: ' + (data.target_image || 'previous')});
                renderLogPanel(name);
                expanded[name] = true;
                var el = document.getElementById('detail-' + name);
                if (el) el.classList.remove('hidden');
                var ch = document.getElementById('chevron-' + name);
                if (ch) ch.classList.add('open');
            });
        };

        window.deferContainer = function(name, days) {
            fetch('/api/containers/' + name + '/defer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({days: days})
            }).then(function() { refreshContainers(); });
        };

        window.cancelDefer = function(name) {
            fetch('/api/containers/' + name + '/cancel-defer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            }).then(function() { refreshContainers(); });
        };

        window.clearLogs = function(name) {
            containerLogs[name] = [];
            renderLogPanel(name);
        };

        window.checkAll = function() {
            document.getElementById('check-btn').disabled = true;
            document.getElementById('check-spinner').classList.remove('hidden');
            var banner = document.getElementById('scan-banner');
            banner.classList.add('hidden');
            containerLogs = {};
            Object.keys(expanded).forEach(function(name) { renderLogPanel(name); });
            fetch('/api/check?scope=main', { method: 'POST' })
                .then(function(r) { return r.json(); })
                .then(function(results) {
                    document.getElementById('check-btn').disabled = false;
                    document.getElementById('check-spinner').classList.add('hidden');

                    // Merge check results into existing containers array (don't replace!)
                    results.forEach(function(r) {
                        var c = containers.find(function(x) { return x.name === r.name; });
                        if (c) {
                            c.stale = r.stale;
                            c.check_error = r.check_error || '';
                            checked[r.name] = r.check_error ? 'error' : (r.stale ? 'stale' : 'ok');
                        }
                    });

                    // Also clear checked state for any main containers not in results
                    containers.forEach(function(c) {
                        if (!isDatabase(c) && !isSidecar(c) && !results.find(function(r) { return r.name === c.name; })) {
                            delete checked[c.name];
                        }
                    });

                    renderList();
                    autoUpdateStale();

                    var total = results.length;
                    var updates = results.filter(function(c) { return c.stale; }).length;
                    var errors = results.filter(function(c) { return c.check_error; }).length;
                    var upToDate = total - updates - errors;
                    if (errors > 0) {
                        banner.className = 'mb-4 px-4 py-3 rounded-xl text-sm font-medium border bg-red-500/10 border-red-500/30 text-red-400';
                        banner.textContent = errors + ' failed \u2022 ' + updates + ' update' + (updates !== 1 ? 's' : '') + ' available \u2022 ' + upToDate + ' up to date';
                        results.filter(function(c) { return c.check_error; }).forEach(function(c) {
                            showToast(c.name + ': ' + c.check_error, 'error');
                        });
                    } else if (updates > 0) {
                        banner.className = 'mb-4 px-4 py-3 rounded-xl text-sm font-medium border bg-amber-500/10 border-amber-500/30 text-amber-400';
                        banner.textContent = updates + ' update' + (updates !== 1 ? 's' : '') + ' available \u2022 ' + upToDate + ' up to date';
                    } else {
                        banner.className = 'mb-4 px-4 py-3 rounded-xl text-sm font-medium border bg-emerald-500/10 border-emerald-500/30 text-emerald-400';
                        banner.textContent = 'All ' + total + ' container' + (total !== 1 ? 's' : '') + ' up to date';
                    }
                    banner.classList.remove('hidden');
                    setTimeout(function() { banner.classList.add('hidden'); }, 30000);
                })
                .catch(function() {
                    document.getElementById('check-btn').disabled = false;
                    document.getElementById('check-spinner').classList.add('hidden');
                });
        };

        window.selfUpdate = function() {
            if (!confirm('Update Dockyard? Container will restart.')) return;
            var btn = document.getElementById('self-update-btn');
            btn.disabled = true;
            document.getElementById('self-update-text').textContent = 'Updating...';
            fetch('/api/update/self', { method: 'POST' }).then(function() {}).catch(function() {});
        };

        function renderLogPanel(name) {
            var el = document.getElementById('log-content-' + name);
            if (!el) return;
            el.innerHTML = renderLogLines(name);
            el.scrollTop = el.scrollHeight;
        }

        function addLog(name, msg) {
            if (!name) return;
            if (!containerLogs[name]) containerLogs[name] = [];
            containerLogs[name].push({time: new Date().toLocaleTimeString(), msg: msg});
            if (expanded[name]) renderLogPanel(name);
        }

        function showUpdateProgress() {
            var container = document.getElementById('update-progress');
            container.classList.remove('hidden');
            updateProgress();
        }

        function updateProgress() {
            var bar = document.getElementById('update-progress-bar');
            var etaEl = document.getElementById('update-eta');
            if (!updateStart || updateTotal === 0) {
                document.getElementById('update-progress').classList.add('hidden');
                return;
            }
            var pct = Math.round((updateDone / updateTotal) * 100);
            bar.style.width = pct + '%';
            if (updateDone >= updateTotal) {
                bar.className = 'h-full bg-emerald-500 rounded-full transition-all duration-300';
                etaEl.textContent = 'Done (' + updateTotal + '/' + updateTotal + ')';
                setTimeout(function() {
                    document.getElementById('update-progress').classList.add('hidden');
                    bar.style.width = '0%';
                    bar.className = 'h-full bg-dock-500 rounded-full transition-all duration-300';
                }, 5000);
            } else {
                var elapsed = (Date.now() - updateStart) / 1000;
                var perContainer = elapsed / Math.max(updateDone, 1);
                var remaining = (updateTotal - updateDone) * perContainer;
                var mins = Math.floor(remaining / 60);
                var secs = Math.floor(remaining % 60);
                etaEl.textContent = (mins > 0 ? mins + 'm ' : '') + secs + 's left \u2022 ' + updateDone + '/' + updateTotal;
            }
        }

        function dataHash(data) {
            return JSON.stringify(data.map(function(c) { return [c.name, c.stale, c.state, c.update_mode, c.is_deferred, c.check_error]; }));
        }

        var lastHash = '';
        var isLoading = false;

        function refreshContainers() {
            if (isLoading) return;
            isLoading = true;
            fetch('/api/containers')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    containers = data;
                    // Initialize checked map from persisted state
                    containers.forEach(function(c) {
                        if (c.checked_at && !checked[c.name]) {
                            if (c.check_error) checked[c.name] = 'error';
                            else if (c.stale) checked[c.name] = 'stale';
                            else checked[c.name] = 'ok';
                        }
                    });
                    isLoading = false;
                    renderList();
                })
                .catch(function() { isLoading = false; });
        }

        function autoUpdateStale() {
            if (updateTotal > 0 && updateDone < updateTotal) return;
            var toUpdate = [];
            containers.forEach(function(c) {
                if (getVisualState(c) === 'stale' && c.update_mode === 'auto' && !c.is_self && !c.is_deferred && !isSidecar(c) && !isDatabase(c)) {
                    toUpdate.push(c);
                }
            });
            if (toUpdate.length > 0) {
                updateTotal = toUpdate.length;
                updateDone = 0;
                updateStart = Date.now();
                showUpdateProgress();
                toUpdate.forEach(function(c) { triggerUpdate(c.name); });
            }
        }

        // --- SSE ---
        var eventSource = new EventSource('/api/events');

        eventSource.addEventListener('log_line', function(e) {
            var data = JSON.parse(e.data);
            addLog(data.container, data.message);
        });

        eventSource.addEventListener('update_started', function(e) {
            var data = JSON.parse(e.data);
            addLog(data.container, 'Update started');
        });

        eventSource.addEventListener('update_complete', function(e) {
            var data = JSON.parse(e.data);
            var name = data.container;
            addLog(name, 'Update complete');
            updateDone++;
            updateProgress();
            fetch('/api/containers').then(function(r) { return r.json(); }).then(function(allContainers) {
                containers = allContainers;
                checked[name] = 'ok';
                var c = containers.find(function(x) { return x.name === name; });
                if (c) {
                    c.stale = false;
                    c.check_error = '';
                }
                updateCardVisualState(name);
                updateStats();
            });
        });

        eventSource.addEventListener('update_failed', function(e) {
            var data = JSON.parse(e.data);
            addLog(data.container, 'Update failed');
            checked[data.container] = 'error';
            updateDone++;
            updateProgress();
            fetch('/api/containers').then(function(r) { return r.json(); }).then(function(allContainers) {
                containers = allContainers;
                updateCardVisualState(data.container);
                updateStats();
            });
        });

        eventSource.addEventListener('scan_started', function(e) {
            document.getElementById('check-btn').disabled = true;
            document.getElementById('check-spinner').classList.remove('hidden');
            document.getElementById('scan-banner').classList.add('hidden');
        });

        eventSource.addEventListener('scan_complete', function(e) {
            document.getElementById('check-btn').disabled = false;
            document.getElementById('check-spinner').classList.add('hidden');
            refreshContainers();
        });

        // Initial load
        refreshContainers();

        // Silent background refresh every 60s (no flash)
        setInterval(function() {
            if (isLoading) return;
            isLoading = true;
            fetch('/api/containers')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var hash = dataHash(data);
                    containers = data;
                    isLoading = false;
                    if (hash !== lastHash) {
                        lastHash = hash;
                        renderList();
                    }
                })
                .catch(function() { isLoading = false; });
        }, 60000);

        // Auto-check status + live countdown
        var autoCheckData = { last_check: null, next_check: null, interval_ms: 0, schedule: '' };

        function refreshAutoCheckStatus() {
            fetch('/api/auto-check-status')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    autoCheckData = data;
                    renderAutoCheckBar();
                })
                .catch(function() {});
        }

        function renderAutoCheckBar() {
            var lastEl = document.getElementById('auto-last');
            var nextEl = document.getElementById('auto-next');
            var intervalEl = document.getElementById('auto-interval');

            if (autoCheckData.last_check) {
                var ago = Math.round((Date.now() - new Date(autoCheckData.last_check).getTime()) / 1000);
                if (ago < 60) lastEl.textContent = 'Last check: ' + ago + 's ago';
                else if (ago < 3600) lastEl.textContent = 'Last check: ' + Math.floor(ago / 60) + 'm ' + (ago % 60) + 's ago';
                else lastEl.textContent = 'Last check: ' + Math.floor(ago / 3600) + 'h ' + Math.floor((ago % 3600) / 60) + 'm ago';
            } else {
                lastEl.textContent = 'Last check: never';
            }

            if (autoCheckData.next_check) {
                var remaining = Math.max(0, Math.round((new Date(autoCheckData.next_check).getTime() - Date.now()) / 1000));
                if (remaining <= 0) {
                    nextEl.textContent = 'Next check: due now';
                } else if (remaining < 60) {
                    nextEl.textContent = 'Next check: in ' + remaining + 's';
                } else if (remaining < 3600) {
                    nextEl.textContent = 'Next check: in ' + Math.floor(remaining / 60) + 'm ' + (remaining % 60) + 's';
                } else {
                    nextEl.textContent = 'Next check: in ' + Math.floor(remaining / 3600) + 'h ' + Math.floor((remaining % 3600) / 60) + 'm';
                }
                nextEl.classList.remove('hidden');
            } else {
                nextEl.classList.add('hidden');
            }

            if (autoCheckData.schedule && autoCheckData.schedule !== '@yearly') {
                intervalEl.textContent = 'Schedule: ' + autoCheckData.schedule;
            } else {
                intervalEl.textContent = 'Auto-check disabled';
            }
        }

        refreshAutoCheckStatus();
        setInterval(refreshAutoCheckStatus, 15000);
        setInterval(renderAutoCheckBar, 1000);

        // Also refresh after scan completes
        eventSource.addEventListener('scan_complete', function(e) {
            refreshAutoCheckStatus();
        });

        // Check for Dockyard self-updates on load
        fetch('/api/update/check')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.available) {
                    var btn = document.getElementById('self-update-btn');
                    btn.classList.remove('hidden');
                    document.getElementById('self-update-text').textContent = 'Update to ' + esc(data.latest_version);
                    btn.title = data.body ? data.body.substring(0, 200) : 'Update available';
                }
            })
            .catch(function() {});
    })();
    </script>
</body>
